name: 下载 LiteLLM 镜像为 tar

# 支持 手动触发
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取最新镜像
        run: docker pull ghcr.io/berriai/litellm:main-stable

      - name: 导出为 tar 文件
        run: docker save -o litellm.tar ghcr.io/berriai/litellm:main-stable

      - name: 上传为可下载文件
        uses: actions/upload-artifact@v4
        with:
          name: litellm-image
          path: litellm-new.tar
